<!-- myapp/templates/myapp/login.html -->
{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FocusFlow</title>
    <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1 class="logo-text" style="font-size: 2rem;">Welcome Back</h1>
            <p class="slogan" style="margin-bottom: 30px;">继续你的专注之旅</p>

            <form method="post">
                {% csrf_token %}

                <!-- 简单的错误提示 -->
                {% if form.errors %}
                    <div style="color: #ff3b30; font-size: 0.9rem; margin-bottom: 20px;">
                        用户名或密码不正确，请重试。
                    </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-input" placeholder="请输入用户名" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 30px;">立即登录</button>
            </form>

            <div style="margin-top: 20px;">
                <a href="{% url 'myapp:register' %}" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem;">还没有账号？去注册</a>
            </div>
        </div>
    </div>
</body>
</html>
